<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preset Sweep Viewer</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/preset_sweep.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1>Preset Sweep</h1>
        <p class="sidebar-subtitle">A1 raw vs SA3 variants</p>
        <input id="search" type="search" placeholder="Filter by stem id or category…" autocomplete="off">
        <select id="category-filter">
          <option value="">All categories</option>
        </select>
      </header>
      <ul id="stem-list" class="song-list"></ul>
    </aside>

    <main class="main">
      <div id="empty-state" class="empty-state">
        <p>Select a probe stem to compare A1 (raw) against preset variants.</p>
      </div>

      <div id="stem-detail" class="song-detail hidden">
        <header class="song-header">
          <div class="song-header-text">
            <h2 id="stem-title"></h2>
            <p id="stem-meta" class="song-meta"></p>
            <p id="stem-note" class="song-path"></p>
          </div>
          <div class="song-nav">
            <button id="prev-btn" type="button">← Prev</button>
            <button id="next-btn" type="button">Next →</button>
          </div>
        </header>

        <section class="comparison-section">
          <h3>Reference (A1 raw)</h3>
          <div id="reference-cell" class="preset-reference"></div>
        </section>

        <section class="comparison-section">
          <h3>Variants</h3>
          <div id="variants-grid" class="preset-variants-grid"></div>
        </section>

        <section class="comparison-section notes-section">
          <h3>Notes</h3>
          <textarea id="notes" rows="4" placeholder="Subjective notes for this stem (saved in browser localStorage)…"></textarea>
          <div class="notes-actions">
            <button id="export-notes" type="button">Export notes JSON</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="/static/preset_sweep.js"></script>
</body>
</html>
