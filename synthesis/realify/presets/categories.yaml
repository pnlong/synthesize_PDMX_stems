# Per-category SA3 realify presets.
# default is merged first; matching category overrides apply on top.
# Tune categories after preset-sweep listening (experiments/preset_sweep/).

default:
  init_noise_level: 0.45
  prompt_variant: current
  steps: 8
  cfg_scale: 1.0

categories:
  drums: {}
  piano: {}
  strings: {}
  wind: {}
  voice: {}
  mallet: {}
  organ: {}
  guitar: {}
  brass: {}

# First matching rule wins. Unmatched stems use default only.
routing:
  - category: drums
    is_drum: true
  - category: piano
    name_keywords: [piano]
  - category: organ
    name_keywords: [organ]
  - category: mallet
    name_keywords: [marimba, vibraphone, xylophone, glockenspiel]
  - category: voice
    name_keywords: [voice, soprano, alto, tenor, baritone, choir, vocal, part_1]
  - category: guitar
    name_keywords: [guitar]
  - category: strings
    name_keywords:
      - violin
      - viola
      - violoncello
      - cello
      - contrabass
      - basses
      - string
      - violins
      - violoncellos
  - category: brass
    name_keywords: [trumpet, trombone, horn, tuba, brass, cornet, flugelhorn]
  - category: wind
    name_keywords:
      - flute
      - clarinet
      - saxophone
      - sax
      - oboe
      - bassoon
      - recorder
      - piccolo
      - woodwind
